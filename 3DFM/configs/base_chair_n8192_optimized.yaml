data:
  data_mode: pointflow
  data_root: 3DFM/src/data/ShapeNetCore.v2.PC15k
  category: Chair
  split: train
  pointflow_part: all
  pointflow_normalize: global
  shape_index: 0
  num_shapes: 0
  num_points: 8192
  target_subsample: random
  target_order: shuffle

model:
  arch: base
  hidden_dim: 256
  num_layers: 6
  num_heads: 8
  dropout: 0.0

training:
  batch_size: 1
  epochs: 300
  lr: 2.0e-4
  weight_decay: 0.0
  lr_gamma: 0.99
  ema_decay: 0.9999
  seed: 42
  log_every: 100
  sample_every: 1000
  device: auto

sampling:
  nfe: 64

output:
  out_dir: runs/base_chair_n8192_optimized
