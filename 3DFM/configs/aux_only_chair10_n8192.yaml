data:
  data_mode: pointflow
  data_root: 3DFM/src/data/ShapeNetCore.v2.PC15k
  category: Chair
  split: train
  pointflow_part: all
  pointflow_normalize: global
  shape_index: 0
  num_shapes: 0
  num_points: 8192
  target_subsample: random
  target_order: shuffle

model:
  arch: xhat_selfcond
  hidden_dim: 256
  num_layers: 6
  early_layers: 3
  num_heads: 8
  dropout: 0.0
  use_xhat_condition: false

training:
  batch_size: 1
  steps: 30000
  lr: 2.0e-4
  aux_weight: 0.5
  seed: 42
  log_every: 100
  sample_every: 1000
  device: auto

sampling:
  nfe: 64

output:
  out_dir: runs/aux_only_chair_n8192
