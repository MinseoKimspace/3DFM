experiment_name: shapenet_chair_base
seed: 42
output_dir: runs/shapenet_chair_base

data:
  root: data/shapenet_pyg
  category: Chair
  num_workers: 4

model:
  arch: base
  num_points: 1024
  hidden_dim: 128
  num_layers: 4
  early_layers: 0
  late_layers: 0
  num_slots: 0
  code_mode: normal
  num_heads: 4
  dropout: 0.0

training:
  batch_size: 16
  lr: 0.0002
  epochs: 5
  log_every: 10
  sample_every: 200
  checkpoint_every: 1000
  device: auto

loss:
  mu: -0.4
  sigma: 1.0
  neq_ratio: 0.5

sampling:
  steps: 50
  num_samples: 4

wandb:
  enabled: false
  project: 3dIMF
