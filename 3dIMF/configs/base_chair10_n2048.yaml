data:
  data_mode: shapenet
  data_root: 3dIMF/src/data/shapenet_pyg
  category: Chair
  split: train
  shape_index: 0
  num_shapes: 10
  num_points: 2048
  target_order: shuffle

model:
  hidden_dim: 256
  num_layers: 6
  num_heads: 8

training:
  batch_size: 4
  steps: 30000
  lr: 2.0e-4
  seed: 42
  log_every: 100
  sample_every: 1000
  device: auto

sampling:
  nfe: 64

output:
  out_dir: runs/base_chair10_n2048
